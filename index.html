<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2.0 Under Maintenance</title>
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #38bdf8;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 3rem; margin-bottom: 0.5rem; color: var(--accent); }
        h2 { font-weight: 300; opacity: 0.8; margin-top: 0; }
        
        #countdown {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 2rem 0;
            font-variant-numeric: tabular-nums;
        }

        .note {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            text-align: left;
            border-left: 4px solid var(--accent);
        }

        .note ul { margin: 0.5rem 0 0 1.2rem; padding: 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>V2.0</h1>
        <h2>Under Maintenance</h2>

        <div id="countdown">00:00:00</div>

        <div class="note">
            <strong>What's coming in this update:</strong>
            <ul>
                <li>Addition of IA Questions and 2024 & 2025 sets.</li>
                <li>Enhanced UI performance and bug fixes.</li>
                <li>Database optimizations for faster retrieval.</li>
            </ul>
        </div>
    </div>

    <script>
        function updateCountdown() {
            const now = new Date();
            // Sets target to 6 PM (18:00) today, April 30, 2026
            const target = new Date();
            target.setHours(18, 0, 0, 0);

            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = "UPDATE LIVE";
                return;
            }

            const hours = Math.floor(diff / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerHTML = 
                `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
